<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atlas Travels — Sales Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f7;--s1:#ffffff;--s2:#f8f9fb;--s3:#eef0f4;--brd:#e2e6ed;--brd2:#d0d5de;--or:#f97316;--orD:#ea580c;--orL:rgba(249,115,22,.10);--gr:#16a34a;--bl:#2563eb;--blL:rgba(37,99,235,.10);--re:#dc2626;--am:#d97706;--amL:rgba(217,119,6,.10);--pu:#7c3aed;--puL:rgba(124,58,237,.10);--tx:#111827;--txM:#6b7280;--txD:#9ca3af}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}
html,body{height:100%;background:var(--bg);color:var(--tx);overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--s3)}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:4px}
button{cursor:pointer;font-family:'Inter',sans-serif}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;min-width:220px;background:var(--s1);border-right:1px solid var(--brd);display:flex;flex-direction:column;box-shadow:1px 0 4px rgba(0,0,0,.05)}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.brand{padding:16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px}
.brandIcon{width:36px;height:36px;background:linear-gradient(135deg,var(--or),var(--orD));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.brandName{font-weight:800;font-size:14px}.brandSub{font-size:10px;color:var(--txM)}
nav{padding:10px 8px;flex:1}
.navBtn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;color:var(--txM);font-size:13px;font-weight:500;transition:.15s;border-left:3px solid transparent;cursor:pointer}
.navBtn:hover{background:var(--s3);color:var(--tx)}.navBtn.on{background:var(--orL);color:var(--orD);border-left-color:var(--or);font-weight:700}
.sideUser{padding:12px 14px;border-top:1px solid var(--brd);display:flex;align-items:center;gap:10px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;color:#fff}
.soBtn{background:none;border:none;color:var(--txD);font-size:16px;margin-left:auto;padding:4px;cursor:pointer}
.kpiGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpiCard{background:var(--s1);border:1px solid var(--brd);border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kpiLbl{color:var(--txM);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.kpiVal{font-weight:800;font-size:28px;line-height:1}.kpiSub{color:var(--txD);font-size:11px;margin-top:4px}
.tCard{background:var(--s1);border:1px solid var(--brd);border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tCardH{padding:12px 16px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:13px}
table{width:100%;border-collapse:collapse}
th{padding:8px 14px;color:var(--txM);font-size:10px;text-align:left;font-weight:600;text-transform:uppercase;background:var(--s2)}
td{padding:10px 14px;border-top:1px solid var(--brd);font-size:13px}
tr:hover td{background:var(--s3)}
.pill{border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#f0f4ff 0%,#fdf4ff 50%,#fff7ed 100%);display:flex;align-items:center;justify-content:center;z-index:1000}
.lCard{background:var(--s1);border:1px solid var(--brd);border-radius:16px;padding:28px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.10)}
.lLogoIcon{width:60px;height:60px;background:linear-gradient(135deg,var(--or),var(--orD));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px}
.lTitle{font-weight:800;font-size:20px;text-align:center}.lSub{color:var(--txM);font-size:13px;margin-top:4px;text-align:center;margin-bottom:24px}
.fLbl{display:block;color:var(--txM);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fInp{display:block;width:100%;background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:10px 14px;color:var(--tx);font-size:13px;outline:none;margin-bottom:14px}
.fInp:focus{border-color:var(--or)}
.lBtn{width:100%;background:linear-gradient(135deg,var(--or),var(--orD));border:none;border-radius:8px;padding:11px;color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.lErr{color:var(--re);font-size:12px;margin-bottom:10px;display:none}
.demoBox{background:var(--s3);border:1px solid var(--brd);border-radius:8px;padding:14px;margin-top:16px}
.demoLbl{color:var(--txM);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.demoRow{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.demoUse{font-size:10px;font-weight:600;border-radius:4px;padding:3px 8px;border:1px solid;cursor:pointer}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="loginScreen">
  <div style="width:100%;max-width:400px;padding:20px">
    <div class="lCard">
      <div class="lLogoIcon">✈</div>
      <div class="lTitle">Atlas Travels</div>
      <div class="lSub">WhatsApp Sales Operations</div>
      <label class="fLbl">Email</label>
      <input class="fInp" id="iEmail" type="email" placeholder="your@atlastravels.co.uk" onkeydown="if(event.key==='Enter')login()">
      <label class="fLbl">Password</label>
      <input class="fInp" id="iPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
      <div class="lErr" id="lErr">Invalid credentials</div>
      <button class="lBtn" onclick="login()">Sign In →</button>
      <div class="demoBox">
        <div class="demoLbl">Demo Accounts</div>
        <div class="demoRow">
          <span style="font-size:11px;font-weight:600;color:#7c3aed">Manager — Abdul Rashid</span>
          <button class="demoUse" style="color:#7c3aed;border-color:rgba(124,58,237,.4);background:var(--puL)" onclick="fill('abdul@atlastravels.co.uk','manager123')">Use</button>
        </div>
        <div class="demoRow">
          <span style="font-size:11px;font-weight:600;color:var(--or)">Agent — Omar</span>
          <button class="demoUse" style="color:var(--or);border-color:rgba(249,115,22,.4);background:var(--orL)" onclick="fill('omar@atlastravels.co.uk','agent123')">Use</button>
        </div>
        <div class="demoRow">
          <span style="font-size:11px;font-weight:600;color:var(--bl)">Agent — Fuzel</span>
          <button class="demoUse" style="color:var(--bl);border-color:rgba(37,99,235,.4);background:var(--blL)" onclick="fill('fuzel@atlastravels.co.uk','agent123')">Use</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div id="sidebar">
    <div class="brand">
      <div class="brandIcon">✈</div>
      <div><div class="brandName">Atlas Travels</div><div class="brandSub">Sales Ops</div></div>
    </div>
    <nav id="nav"></nav>
    <div class="sideUser">
      <div class="av" id="suAv" style="width:30px;height:30px;font-size:11px"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="suNm"></div>
        <div style="font-size:10px;font-weight:500" id="suRl"></div>
      </div>
      <button class="soBtn" onclick="logout()">⏻</button>
    </div>
  </div>
  <div id="main">
    <div id="vCalls" style="height:100%;overflow-y:auto;display:none"></div>
    <div id="vEmpty" style="display:flex;flex:1;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--txM)">
      <div style="font-size:40px">✈</div>
      <div style="font-size:14px;font-weight:500">Select a section from the sidebar</div>
    </div>
  </div>
</div>

<script>
const USERS = {
  'abdul@atlastravels.co.uk':{pass:'manager123',name:'Abdul Rashid',role:'manager',av:'AR',col:'#7c3aed'},
  'omar@atlastravels.co.uk':{pass:'agent123',name:'Omar',role:'agent',av:'OM',col:'#f97316'},
  'fuzel@atlastravels.co.uk':{pass:'agent123',name:'Fuzel',role:'agent',av:'FU',col:'#2563eb'},
  'shuja@atlastravels.co.uk':{pass:'agent123',name:'Shuja',role:'agent',av:'SH',col:'#16a34a'},
  'zainab@atlastravels.co.uk':{pass:'agent123',name:'Zainab',role:'agent',av:'ZA',col:'#db2777'},
};
let CU=null;
function fill(e,p){document.getElementById('iEmail').value=e;document.getElementById('iPass').value=p;}
function login(){
  const e=document.getElementById('iEmail').value.trim(),p=document.getElementById('iPass').value,u=USERS[e];
  if(u&&u.pass===p){CU=u;document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='flex';boot();}
  else{document.getElementById('lErr').style.display='block';}
}
function logout(){CU=null;document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';}
function boot(){
  const av=document.getElementById('suAv');
  av.style.background='linear-gradient(135deg,'+CU.col+','+CU.col+'99)';
  av.textContent=CU.av;
  document.getElementById('suNm').textContent=CU.name;
  const rl=document.getElementById('suRl');rl.textContent=CU.role;rl.style.color=CU.col;
  document.getElementById('nav').innerHTML=`<button class="navBtn on" onclick="showCalls()"><span style="font-size:16px;width:20px;text-align:center">📞</span><span>Call Log</span></button>`;
  showCalls();
}

// ── CALL LOG ──────────────────────────────────────────────────────────────────
const ICS_URL='https://icscallanalytics.yourwhc.co.uk';
let _live=[],_agents=[],_ext=[],_kpis={},_tick=null,_icsWin=null;

// Receive data via postMessage from ICS window (cross-origin)
window.addEventListener('message',e=>{if(e.data?.type==='ics_data')ingest(e.data);});

function hms(s){if(!s||typeof s!=='string')return 0;const p=s.trim().split(':').map(Number);return p.length===3?p[0]*3600+p[1]*60+p[2]:p.length===2?p[0]*60+p[1]:0;}
function fmt(n){n=Math.max(0,Math.floor(n));return[Math.floor(n/3600),Math.floor((n%3600)/60),n%60].map(v=>String(v).padStart(2,'0')).join(':');}
function badge(s){const c=s==='On Call'?'#22c55e':s==='On Hold'?'#f59e0b':s==='Free'?'#3b82f6':'#6b7280';return `<span class="pill" style="background:${c}18;color:${c};border:1px solid ${c}55">${s}</span>`;}
function setStatus(s){const el=document.getElementById('icsStatus');if(!el)return;const m={live:['🟢 Live','#22c55e','#14532d'],connecting:['⏳ Connecting…','#f59e0b','#92400e'],error:['⚠️ Check ICS tab','#dc2626','#7f1d1d']};const[lb,bg,tx]=m[s]||m.connecting;el.textContent=lb;el.style.cssText=`padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;background:${bg}18;color:${tx};border:1px solid ${bg}44`;}

function showCalls(){
  document.getElementById('vCalls').style.display='block';
  document.getElementById('vEmpty').style.display='none';
  document.getElementById('vCalls').innerHTML=`
<div style="height:100%;display:flex;flex-direction:column;background:var(--bg)">
  <div style="padding:16px 24px 0;flex-shrink:0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>
        <div style="font-weight:800;font-size:18px">📞 Call Analytics</div>
        <div style="color:var(--txM);font-size:12px;margin-top:3px;display:flex;align-items:center;gap:8px">
          ICS Live · Atlas Travels
          <span id="icsStatus" style="padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;background:#f59e0b18;color:#92400e;border:1px solid #f59e0b44">Not connected</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="lastUp" style="color:var(--txD);font-size:11px;font-variant-numeric:tabular-nums"></span>
        <button onclick="connectICS()" id="connectBtn" style="background:linear-gradient(135deg,var(--or),var(--orD));color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(249,115,22,.3)">🔗 Connect to ICS</button>
        <a href="${ICS_URL}/MyDashboard" target="_blank" style="background:var(--blL);color:var(--bl);border:1px solid rgba(37,99,235,.3);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;text-decoration:none">Open ICS ↗</a>
      </div>
    </div>
    <div class="kpiGrid">
      <div class="kpiCard"><div class="kpiLbl">Sales Calls</div><div class="kpiVal" style="color:var(--gr)" id="kS">—</div><div class="kpiSub">Today</div></div>
      <div class="kpiCard"><div class="kpiLbl">Incoming</div><div class="kpiVal" style="color:var(--bl)" id="kI">—</div><div class="kpiSub">Today</div></div>
      <div class="kpiCard"><div class="kpiLbl">Missed</div><div class="kpiVal" style="color:var(--re)" id="kM">—</div><div class="kpiSub">Needs callback</div></div>
      <div class="kpiCard"><div class="kpiLbl">Admin Calls</div><div class="kpiVal" style="color:var(--am)" id="kA">—</div><div class="kpiSub">Today</div></div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0 24px 24px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div class="tCard">
        <div class="tCardH">
          <span>🔴 Live Calls</span>
          <span style="font-size:11px;color:var(--txM);display:flex;align-items:center;gap:5px">
            <span id="liveCount" style="font-weight:700;color:var(--or)">0</span> active
            <span style="width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;animation:pulse 2s infinite"></span>
          </span>
        </div>
        <div id="liveCalls"><div style="padding:32px;color:var(--txD);text-align:center;font-size:13px">Click Connect to ICS to load live data</div></div>
      </div>
      <div class="tCard">
        <div class="tCardH">👤 Agent Activity</div>
        <div id="agentAct"><div style="padding:32px;color:var(--txD);text-align:center;font-size:13px">Click Connect to ICS to load live data</div></div>
      </div>
    </div>
    <div class="tCard">
      <div class="tCardH"><span>📋 Extension Call Activity</span><span style="font-size:11px;color:var(--txM);font-weight:400">All extensions · today</span></div>
      <div id="extAct" style="overflow-x:auto"><div style="padding:32px;color:var(--txD);text-align:center;font-size:13px">Click Connect to ICS to load live data</div></div>
    </div>
  </div>
</div>`;
  // Start timer tick
  if(_tick)clearInterval(_tick);
  _tick=setInterval(()=>{
    _live.forEach((r,i)=>{if(r.s==='On Call'||r.s==='On Hold'){r.secs++;const el=document.getElementById('lt'+i);if(el)el.textContent=fmt(r.secs);}});
    _agents.forEach((r,i)=>{if(r.s==='On Call'){r.talk++;const el=document.getElementById('at'+i);if(el)el.textContent=fmt(r.talk);}});
  },1000);
  // Auto-connect if ICS window already open
  if(_icsWin&&!_icsWin.closed)sendToICS();
}

function connectICS(){
  const btn=document.getElementById('connectBtn');
  if(btn){btn.textContent='⏳ Connecting…';btn.disabled=true;}
  setStatus('connecting');
  // Open ICS in new window — stays in background
  _icsWin=window.open(ICS_URL+'/MyDashboard','atlas_ics');
  // After ICS loads, inject the sender script
  setTimeout(sendToICS,5000);
  // Keep re-injecting every 30s to stay live
  setInterval(sendToICS,30000);
}

function sendToICS(){
  if(!_icsWin||_icsWin.closed)return;
  try{
    // Inject postMessage sender into ICS window
    const s=_icsWin.document.createElement('script');
    s.textContent=`
      if(!window._atlasSender){
        window._atlasSender=true;
        function _send(){
          const k={};
          document.querySelectorAll('.grid-stack-item').forEach(el=>{
            const t=el.querySelector('.itemHeader span')?.textContent?.trim()||'';
            const v=(el.querySelector('.tile-value-w')||el.querySelector('.tile-value'))?.textContent?.trim()||'';
            if(t.includes('Total Sales Calls')&&!t.includes(' 1'))k.sales=v;
            if(t==='Total Incoming Calls')k.inc=v;
            if(t==='Total Missed Calls')k.missed=v;
            if(t==='Total Admin Calls')k.admin=v;
          });
          const tbls=[];
          document.querySelectorAll('table').forEach(t=>{
            const h=[...t.querySelectorAll('th')].map(x=>x.textContent.trim().toLowerCase());
            const r=[...t.querySelectorAll('tbody tr')].map(row=>[...row.querySelectorAll('td')].map(c=>c.textContent.trim()));
            tbls.push({h,r});
          });
          window.opener?.postMessage({type:'ics_data',kpis:k,
            liveRows:tbls.find(t=>t.h.includes('current status'))?.r||[],
            agentRows:tbls.find(t=>t.h.includes('totalcalls'))?.r||[],
            extRows:tbls.find(t=>t.h.includes('extension')&&t.h.length>8)?.r||[]
          },'*');
        }
        _send();
        setInterval(_send,3000);
      }
    `;
    _icsWin.document.head.appendChild(s);
    const btn=document.getElementById('connectBtn');
    if(btn){btn.textContent='✅ Connected';btn.style.background='#16a34a';btn.style.boxShadow='0 2px 8px rgba(22,163,74,.3)';}
  }catch(err){setStatus('error');}
}

function ingest(d){
  if(d.kpis){
    if(d.kpis.sales)document.getElementById('kS').textContent=d.kpis.sales;
    if(d.kpis.inc)document.getElementById('kI').textContent=d.kpis.inc;
    if(d.kpis.missed)document.getElementById('kM').textContent=d.kpis.missed;
    if(d.kpis.admin)document.getElementById('kA').textContent=d.kpis.admin;
  }
  if(d.liveRows){
    _live=d.liveRows.map(r=>({ext:r[0],s:r[1],secs:hms(r[2])}));
    const el=document.getElementById('liveCalls');
    const lc=document.getElementById('liveCount');
    if(lc)lc.textContent=_live.filter(r=>r.s==='On Call').length;
    if(el){
      if(!_live.length){el.innerHTML='<div style="padding:32px;color:var(--txD);text-align:center">📵 No active calls right now</div>';}
      else{el.innerHTML='<table><thead><tr><th>Extension</th><th>Status</th><th>Duration</th></tr></thead><tbody>'+
        _live.map((r,i)=>`<tr><td style="font-weight:600">${r.ext}</td><td>${badge(r.s)}</td><td id="lt${i}" style="font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;color:${r.s==='On Call'?'#22c55e':r.s==='On Hold'?'#f59e0b':'var(--tx)'}">${fmt(r.secs)}</td></tr>`).join('')+'</tbody></table>';}
    }
  }
  if(d.agentRows){
    _agents=d.agentRows.map(r=>({agent:r[0],s:r[1],calls:r[2],inc:r[3],out:r[4],talk:hms(r[5])}));
    const el=document.getElementById('agentAct');
    if(el){
      if(!_agents.length){el.innerHTML='<div style="padding:32px;color:var(--txD);text-align:center">No agent data</div>';}
      else{el.innerHTML='<table><thead><tr><th>Agent</th><th>Status</th><th>Calls</th><th>In</th><th>Out</th><th>Talk Time</th></tr></thead><tbody>'+
        _agents.map((r,i)=>`<tr><td style="font-weight:600">${r.agent}</td><td>${badge(r.s)}</td><td style="font-weight:700">${r.calls}</td><td style="color:#3b82f6">${r.inc}</td><td style="color:#f97316">${r.out}</td><td id="at${i}" style="font-variant-numeric:tabular-nums;font-weight:600">${fmt(r.talk)}</td></tr>`).join('')+'</tbody></table>';}
    }
  }
  if(d.extRows&&d.extRows.length){
    _ext=d.extRows;
    const el=document.getElementById('extAct');
    if(el){
      const heads=['Ext','User','Total','Out','Ans','Missed','Bounce','I/T','Int','Avg Talk','Avg Out','Avg In','Total Talk','Total Out','Total In','Avg Ring'];
      el.innerHTML='<table style="font-size:12px"><thead><tr>'+heads.map(h=>'<th style="white-space:nowrap">'+h+'</th>').join('')+'</tr></thead><tbody>'+
        _ext.map(r=>`<tr><td style="font-weight:700;color:var(--or);white-space:nowrap">${r[0]||''}</td><td style="white-space:nowrap">${r[1]||''}</td>${r.slice(2,16).map((v,i)=>'<td style="text-align:right;'+(i===3&&parseInt(r[5])>0?'color:#dc2626;font-weight:700':'')+'">'+(v||'—')+'</td>').join('')}</tr>`).join('')+'</tbody></table>';
    }
  }
  setStatus('live');
  const lu=document.getElementById('lastUp');
  if(lu)lu.textContent='Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
</script>
</body>
</html>
